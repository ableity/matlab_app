<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; }
  .wrap { position: relative; width: 100%; height: 100%; min-height: 42px; touch-action: none; }
  .rail {
    position: absolute; left: 12px; right: 12px; top: 19px; height: 4px;
    border: 1px solid #666; background: #d7d7d7;
  }
  .handle {
    position: absolute; left: 12px; width: 20px; height: 20px;
    transform: translateX(-50%); cursor: ew-resize; user-select: none;
    filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.35));
  }
  #colorMin {
    top: 0; z-index: 3; background: #88a6d8;
    clip-path: polygon(0 0, 100% 0, 100% 58%, 50% 100%, 0 58%);
  }
  #transparent {
    top: 22px; z-index: 4; background: #f4bd98;
    clip-path: polygon(50% 0, 100% 42%, 100% 100%, 0 100%, 0 42%);
  }
</style>
<script>
function setup(htmlComponent) {
  const wrap = document.querySelector('.wrap');
  const rail = document.querySelector('.rail');
  const colorMin = document.getElementById('colorMin');
  const transparent = document.getElementById('transparent');
  let updating = false;
  let activeSource = null;
  let state = { minimum: 0, maximum: 1, allowedMaximum: 1, colorMin: 0, transparency: 0 };

  function clamp(value, low, high) {
    return Math.min(Math.max(value, low), high);
  }

  function positionHandles() {
    const rect = rail.getBoundingClientRect();
    const span = Math.max(state.maximum - state.minimum, Number.EPSILON);
    const minRatio = (state.colorMin - state.minimum) / span;
    const transparentRatio = (state.transparency - state.minimum) / span;
    colorMin.style.left = `${rect.left - wrap.getBoundingClientRect().left + minRatio * rect.width}px`;
    transparent.style.left = `${rect.left - wrap.getBoundingClientRect().left + transparentRatio * rect.width}px`;
  }

  function applyData(data) {
    if (!data || data.minimum === undefined) return;
    updating = true;
    state.minimum = Number(data.minimum);
    state.maximum = Math.max(Number(data.maximum), state.minimum + Number.EPSILON);
    state.allowedMaximum = clamp(
      data.allowedMaximum === undefined ? state.maximum : Number(data.allowedMaximum),
      state.minimum, state.maximum
    );
    state.colorMin = clamp(Number(data.colorMin), state.minimum, state.allowedMaximum);
    state.transparency = clamp(Number(data.transparency), state.colorMin, state.allowedMaximum);
    positionHandles();
    updating = false;
  }

  function send(source) {
    if (updating) return;
    htmlComponent.Data = {
      minimum: state.minimum, maximum: state.maximum,
      allowedMaximum: state.allowedMaximum,
      colorMin: state.colorMin, transparency: state.transparency, source: source
    };
  }

  function beginDrag(event, source) {
    activeSource = source;
    event.currentTarget.setPointerCapture(event.pointerId);
    event.preventDefault();
  }

  function drag(event) {
    if (!activeSource) return;
    const rect = rail.getBoundingClientRect();
    const ratio = clamp((event.clientX - rect.left) / rect.width, 0, 1);
    const value = Math.min(
      state.minimum + ratio * (state.maximum - state.minimum),
      state.allowedMaximum
    );
    if (activeSource === 'min') {
      state.colorMin = value;
      if (state.colorMin > state.transparency) state.transparency = state.colorMin;
    } else {
      state.transparency = value;
      if (state.transparency < state.colorMin) state.colorMin = state.transparency;
    }
    positionHandles();
    send(activeSource);
    event.preventDefault();
  }

  function endDrag(event) {
    if (!activeSource) return;
    drag(event);
    activeSource = null;
  }

  colorMin.addEventListener('pointerdown', event => beginDrag(event, 'min'));
  transparent.addEventListener('pointerdown', event => beginDrag(event, 'transparent'));
  colorMin.addEventListener('pointermove', drag);
  transparent.addEventListener('pointermove', drag);
  colorMin.addEventListener('pointerup', endDrag);
  transparent.addEventListener('pointerup', endDrag);
  colorMin.addEventListener('pointercancel', endDrag);
  transparent.addEventListener('pointercancel', endDrag);
  window.addEventListener('resize', positionHandles);
  htmlComponent.addEventListener('DataChanged', () => applyData(htmlComponent.Data));
  htmlComponent.addEventListener('UpdateSlider', event => applyData(event.Data));
  applyData(htmlComponent.Data);
}
</script>
</head>
<body>
  <div class="wrap">
    <div class="rail"></div>
    <div id="colorMin" class="handle" title="颜色下限"></div>
    <div id="transparent" class="handle" title="透明阈值"></div>
  </div>
</body>
</html>
